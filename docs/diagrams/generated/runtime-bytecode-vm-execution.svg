,1317.2794,1343,1313.2794,1334,1317.2794" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="189.4712" x="1714.71" y="1313.3463">materialize globals/instances</text></g><!--link storageWrite to storage--><g class="link" data-entity-1="ent0056" data-entity-2="ent0037" data-link-type="dependency" data-source-line="117" id="lnk69"><path codeLine="117" d="M2696.29,937.2794 C2718.35,937.2794 2734.66,937.2794 2734.66,937.2794 C2734.66,937.2794 2734.66,1342.2794 2734.66,1342.2794 C2734.66,1342.2794 1642.87,1342.2794 1340.02,1342.2794" fill="none" id="storageWrite-to-storage" style="stroke:#000000;stroke-width:1;"/><polygon fill="#000000" points="1334.02,1342.2794,1343.02,1346.2794,1339.02,1342.2794,1343.02,1338.2794,1334.02,1342.2794" style="stroke:#000000;stroke-width:1;"/></g><!--link helperPkg to GMN70--><g class="link" data-entity-1="ent0052" data-entity-2="ent0071" data-link-type="association" data-source-line="121" id="lnk72"><path d="M3021.9678,1006.2794 C3022.146,1006.2794 3022.3269,1006.2794 3022.5104,1006.2794 C3028.3816,1006.2794 3036.9352,1006.2794 3047.6641,1006.2794 C3069.1219,1006.2794 3099.2813,1006.2794 3134.0875,1006.2794 C3203.7,1006.2794 3291.9,1006.2794 3366.25,1006.2794" fill="none" id="helperPkg-GMN70" style="stroke:#000000;stroke-width:1;stroke-dasharray:7,7;"/></g><g class="legend" data-source-line="134"><rect fill="none" height="189.2656" rx="7.5" ry="7.5" style="stroke:#000000;stroke-width:1;" width="722.7217" x="2935.5323" y="1402.2794"/><text fill="#000000" font-family="Verdana" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="214.1563" x="2940.5323" y="1420.2745">What this diagram clarifies</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="472.4316" x="2940.5323" y="1436.5714">1. Production task/program execution goes directly to the VM path.</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="514.4863" x="2940.5323" y="1452.8682">2. There is no production backend-dispatch seam or interpreter backend.</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="290.7256" x="2940.5323" y="1469.1651">3. The VM hot path is the combination of:</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="97.9453" x="2953.8829" y="1485.462">- register_ir.rs</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="86.5977" x="2953.8829" y="1501.7589">- dispatch.rs</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="51.0576" x="2953.8829" y="1518.0557">- call.rs</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="120.1895" x="2953.8829" y="1534.3526">- dispatch_refs.rs</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="85.4971" x="2953.8829" y="1550.6495">- memory.rs</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="432.8037" x="2940.5323" y="1566.9464">4. `helper_eval` handles const/debug/config/init helpers only.</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="712.7217" x="2940.5323" y="1583.2432">5. Remaining evaluator internals are test-only and are not part of the runtime scan-loop architecture.</text></g><?plantuml-src bLZRRXiv4dtNLt0pBuuzaZ2Nl6Y11MB5mHZhIn0x7ip2W4orA8bmDzaWsR9x1lllUwh8laboTZS1R9ai7jRri4f_2rjLA57cKfkHp7FxKkXNRJOZ_wnDAPqin59cpnjdAxEQszmwySFd2_hVayXiKLgZJBWBTQv4LUG_ztPpRLIeIoMi2rlRsp1sfRmgnQyVUejEccTQ_EN3Q1Hq05nmrTsz-5gPe0ir4m_Nuk9LPLNGrWXfLk8tbPVAYOkTp2j9gwDH2PNbHebtNvnTLHcBpkiCO1SckFgTa5ue-lJbUID-kDARRJZFAoN-6WdyQyqHxvfRPuglL8kCK4xUFveJ5xUcl39n_ZsZyb_xACtX8FtpoNinVJJDIkVRHUdi1Wxm9n68P3zfNygGRG_mZA-SMkoAHG7pShN8hLofLOHULZfVTNlVqJN2F1IZYC_-6O__