531" y="911.1394"/><rect fill="#FFFFFF" height="2" style="stroke:#000000;stroke-width:1;" width="4" x="2395.6531" y="913.1394"/><rect fill="#FFFFFF" height="2" style="stroke:#000000;stroke-width:1;" width="4" x="2395.6531" y="917.1394"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="165.751" x="2180.24" y="939.1345">runtime/vm/local_init.rs</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="212.4131" x="2180.24" y="955.4314">VM local/static initializer plans</text></g><!--entity debugCtx--><g class="entity" data-qualified-name="helperPkg.debugCtx" data-source-line="106" id="ent0059"><rect fill="#FFFFFF" height="62.5938" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="200.2344" x="2773.33" y="1060.6694"/><rect fill="#FFFFFF" height="10" style="stroke:#000000;stroke-width:1;" width="15" x="2953.5644" y="1065.6694"/><rect fill="#FFFFFF" height="2" style="stroke:#000000;stroke-width:1;" width="4" x="2951.5644" y="1067.6694"/><rect fill="#FFFFFF" height="2" style="stroke:#000000;stroke-width:1;" width="4" x="2951.5644" y="1071.6694"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="160.2344" x="2788.33" y="1093.6645">DebugRuntimeContext</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="111.3984" x="2788.33" y="1109.9614">(debug/hook.rs)</text></g><g class="entity" data-qualified-name="GMN15" data-source-line="31" id="ent0016"><path d="M2010.74,539.2794 L2010.74,616.2794 L1966.28,620.2794 L2010.74,624.2794 L2010.74,700.6075 A0,0 0 0 0 2010.74,700.6075 L2304.1497,700.6075 A0,0 0 0 0 2304.1497,700.6075 L2304.1497,549.2794 L2294.1497,539.2794 L2010.74,539.2794 A0,0 0 0 0 2010.74,539.2794" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M2294.1497,539.2794 L2294.1497,549.2794 L2304.1497,549.2794 L2294.1497,539.2794" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="201.8555" x="2016.74" y="556.3463">Native-call symbol metadata is</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="248.6694" x="2016.74" y="571.4791">prepared when the VmModule is built.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="232.2671" x="2016.74" y="586.6119">CALL_NATIVE does not need to split</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="205.9688" x="2016.74" y="601.7447">raw symbol strings every cycle.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="2016.74" y="616.8775">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="249.7485" x="2016.74" y="632.0103">`SIZEOF(...)` operands are resolved to</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="244.3784" x="2016.74" y="647.1431">static types before ST bytecode emit.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="272.4097" x="2016.74" y="662.276">Production codegen emits `SIZEOF_TYPE`</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="256.0708" x="2016.74" y="677.4088">only; legacy `SIZEOF_VALUE` exists for</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="256.9341" x="2016.74" y="692.5416">compatibility / negative-path coverage.</text></g><g class="entity" data-qualified-name="GMN30" data-source-line="59" id="ent0031"><path d="M3058.81,887.0394 L3058.81,987.8363 L3322.0873,987.8363 L3322.0873,897.0394 L3312.0873,887.0394 L3058.81,887.0394" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M3312.0873,887.0394 L3312.0873,897.0394 L3322.0873,897.0394 L3312.0873,887.0394" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="242.2773" x="3064.81" y="904.1063">RegisterLoweringCacheState and the</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="232.9971" x="3064.81" y="919.2391">tier1 specialized executor live here.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="3064.81" y="934.3719">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="231.1436" x="3064.81" y="949.5047">Debug stepping intentionally keeps</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="212.0435" x="3064.81" y="964.6375">stack-bytecode execution as the</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="143.019" x="3064.81" y="979.7703">single source of truth.</text></g><g class="entity" data-qualified-name="GMN46" data-source-line="84" id="ent0047"><path d="M347,1292.9994 L347,1378.6634 L637.896,1378.6634 L637.896,1302.9994 L627.896,1292.9994 L347,1292.9994" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M627.896,1292.9994 L627.896,1302.9994 L637.896,1302.9994 L627.896,1292.9994" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="269.896" x="353" y="1310.0663">Current performance-sensitive boundary:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="245.4321" x="353" y="1325.1991">- VM native-call argument marshaling</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="252.1987" x="353" y="1340.3319">- FUNCTION_BLOCK parameter binding</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="167.667" x="353" y="1355.4647">- OUT / IN_OUT copy-back</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="193.0449" x="353" y="1370.5975">- recursive VM POU execution</text></g><g class="entity" data-qualified-name="GMN49" data-source-line="92" id="ent0050"><path d="M11,1292.9994 L11,1378.6634 L301.896,1378.6634 L301.896,1302.9994 L291.896,1292.9994 L11,1292.9994" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M291.896,1292.9994 L291.896,1302.9994 L301.896,1302.9994 L291.896,1292.9994" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="269.896" x="17" y="1310.0663">Current performance-sensitive boundary:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="168.835" x="17" y="1325.1991">- ValueRef materialization</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="198.6816" x="17" y="1340.3319">- dynamic field/index traversal</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="165.5913" x="17" y="1355.4647">- instance-field resolution</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="241.0078" x="17" y="1370.5975">- storage read/write cloning pressure</text></g><g class="entity" data-qualified-name="GMN70" data-source-line="121" id="ent0071"><path d="M3366.65,849.2094 L3366.65,1025.6703 L3670.254,1025.6703 L3670.254,859.2094 L3660.254,849.2094 L3366.65,849.2094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M3660.254,849.2094 L3660.254,859.2094 L3670.254,859.2094 L3660.254,849.2094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="209.9297" x="3372.65" y="866.2763">These helpers exist for bounded</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="223.1265" x="3372.65" y="881.4091">const/debug/config/init flows only.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="164.4614" x="3372.65" y="896.5419">Startup materialization is</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="231.1753" x="3372.65" y="911.6747">orchestrated by harness::initializer.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="177.7915" x="3372.65" y="926.8075">VM local/static initialization</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="282.604" x="3372.65" y="941.9403">consumes the same default/materialization</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="204.2866" x="3372.65" y="957.0731">service through local init plans.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="3372.65" y="972.206">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="227.7539" x="3372.65" y="987.3388">Scheduled task/program execution</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="245.9971" x="3372.65" y="1002.4716">does not pass through EvalContext or</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="216.3027" x="3372.65" y="1017.6044">an interpreter backend anymore.</text></g><!--link cycle to taskDispatch--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="16" id="lnk6"><path codeLine="16" d="M1870.45,155.5894 C1870.45,166.6094 1870.45,172.9694 1870.45,183.9794" fill="none" id="cycle-to-taskDispatch" 