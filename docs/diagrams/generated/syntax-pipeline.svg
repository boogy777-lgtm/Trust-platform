</text><line style="stroke:#000000;stroke-width:1;" x1="10" x2="10" y1="54.3545" y2="2208.585"/><path d="M377.1709,166.8428 L377.1709,190.542 L357.1709,194.542 L377.1709,198.542 L377.1709,222.2412 A0,0 0 0 0 377.1709,222.2412 L568.2881,222.2412 A0,0 0 0 0 568.2881,222.2412 L568.2881,176.8428 L558.2881,166.8428 L377.1709,166.8428 A0,0 0 0 0 377.1709,166.8428" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M558.2881,166.8428 L558.2881,176.8428 L568.2881,176.8428 L558.2881,166.8428" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="131.2441" x="383.1709" y="183.9097">lexer/mod.rs:lex()</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="159.9736" x="383.1709" y="199.0425">Uses logos derive macro</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="170.1172" x="383.1709" y="214.1753">for zero-copy tokenization</text><rect fill="#FFFFFF" height="32.8047" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1;" width="92.0049" x="265.166" y="178.1396"/><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="72.0049" x="275.166" y="198.3501">Lexer (logos)</text><path d="M362.2393,232.2412 L362.2393,369.4365 L342.2393,373.4365 L362.2393,377.4365 L362.2393,514.6318 A0,0 0 0 0 362.2393,514.6318 L781.7642,514.6318 A0,0 0 0 0 781.7642,514.6318 L781.7642,242.2412 L771.7642,232.2412 L362.2393,232.2412 A0,0 0 0 0 362.2393,232.2412" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M771.7642,232.2412 L771.7642,242.2412 L781.7642,242.2412 L771.7642,232.2412" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="248.2695" x="368.2393" y="249.3081">Token struct (lexer/mod.rs:14-19)</text><text fill=