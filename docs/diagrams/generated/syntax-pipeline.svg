0347">&#8226; Identifiers: 1</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="75.4229" x="368.2393" y="461.1675">&#8226; Special: 2</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="368.2393" y="476.3003">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="398.5249" x="368.2393" y="491.4331">Keywords (156) in docs/diagrams/generated/syntax-stats.md</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="142.7715" x="368.2393" y="506.5659">&#171;TOKEN_STATS_END&#187;</text><rect fill="#FFFFFF" height="32.8047" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1;" width="62.1416" x="280.0977" y="357.0342"/><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="42.1416" x="290.0977" y="377.2446">Token[]</text><line style="stroke:#000000;stroke-width:1;" x1="259.166" x2="259.166" y1="54.3545" y2="2208.585"/><path d="M1267.594,524.6318 L1267.594,563.4639 L1247.594,567.4639 L1267.594,571.4639 L1267.594,610.2959 A0,0 0 0 0 1267.594,610.2959 L1561.429,610.2959 A0,0 0 0 0 1561.429,610.2959 L1561.429,534.6318 L1551.429,524.6318 L1267.594,524.6318 A0,0 0 0 0 1267.594,524.6318" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1551.429,524.6318 L1551.429,534.6318 L1561.429,534.6318 L1551.429,524.6318" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="272.835" x="1273.594" y="541.6987">Source struct (parser/source.rs:8-14)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="168.2065" x="1273.594" y="556.8315">Wraps token stream with:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="164.4297" x="1273.594" y="571.9644">&#8226; peek_kind() - skip trivia</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="112.6709" x="1273.594" y="587.0972">&#8226; current_token()</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="110.8301" x="1273.594" y="602.23">&#8226; peek_kind_n(n)</text><rect fill="#FFFFFF" height="32.8047" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1;" width="107.0332" x="1140.5608" y="551.0615"/><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="87.0332" x="1150.5608" y="571.272">Source wrapper</text><path d="M1231.5361,630.2959 L1231.5361,791.624 L1530.208,791.624 L1530.208,640.2959 L1520.208,630.2959 L1231.5361,630.2959" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1520.208,630.2959 L1520.208,640.2959 L1530.208,640.2959 L1520.208,630.2959" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="277.6719" x="1237.5361" y="647.3628">Parser struct (parser/parser.rs:30-34)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="170.2632" x="1237.5361" y="662.4956">&#8226; source: Source&lt;'t, 'src&gt;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="147.1768" x="1237.5361" y="677.6284">&#8226; events: Vec&lt;Event&gt;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="173.0181" x="1237.5361" y="692.7612">&#8226; errors: Vec&lt;ParseError&gt;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="1237.5361" y="707.894">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="100.896" x="1237.5361" y="723.0269">Key methods:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="116.7778" x="1237.5361" y="738.1597">&#8226; start() &#8594; Marker</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="172.269" x="1237.5361" y="753.2925">&#8226; bump() - consume token</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="165.1978" x="1237.5361" y="768.4253">&#8226; at(kind) - check current</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="170.6821" x="1237.5361" y="783.5581">&#8226; error(msg) - report error</text><path d="M1254.2385,811.624 L1254.2385,957.8193 L1507.5056,957.8193 L1507.5056,821.624 L1497.5056,811.624 L1254.2385,811.624" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1497.5056,811.624 L1497.5056,821.624 L1507.5056,821.624 L1497.5056,811.624" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="114.4102" x="1260.2385" y="828.6909">Error Recovery:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="232.2671" x="1260.2385" y="843.8237">&#8226; recover_statement() skips to next</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="151.6074" x="1268.5032" y="858.9565">statement or block end</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="186.1577" x="1260.2385" y="874.0894">&#8226; sync points include END_*,</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="149.2524" x="1268.5032" y="889.2222">POU starts, VAR blocks</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="206.8765" x="1260.2385" y="904.355">&#8226; expect_semicolon() inserts on</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="165.1914" x="1268.5032" y="919.4878">unambiguous boundaries</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="202.7251" x="1260.2385" y="934.6206">&#8226; errors stored separately; CST</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="164.6201" x="1268.5032" y="949.7534">preserves original tokens</text><rect fill="#FFFFFF" height="32.8047" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1;" width="54.9175" x="1166.6187" y="777.6553"/><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="34.9175" x="1176.6187" y="797.8657">Parser</text><path d="M801.7642,987.8193 L801.7642,1285.3428 L1101.4199,1285.3428 L1101.4199,997.8193 L1091.4199,987.8193 L801.7642,987.8193" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1091.4199,987.8193 L1091.4199,997.8193 L1101.4199,997.8193 L1091.4199,987.8193" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="172.0151" x="807.7642" y="1004.8862">Initializer-position gate</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="278.6558" x="807.7642" y="1020.019">parse_var_initializer() has six code-derived</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="61.1025" x="807.7642" y="1035.1519">call sites:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="275.9199" x="807.7642" y="1050.2847">&#8226; parse_type_decl() after parse_type_def()</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="119.2915" x="807.7642" y="1065.4175">&#8226; parse_var_decl()</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="204.3247" x="807.7642" y="1080.5503">&#8226; VAR_CONFIG init declarations</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="166.3721" x="807.7642" y="1095.6831">&#8226; nested aggregate fields</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="174.2876" x="807.7642" y="1110.8159">&#8226; array initializer elements</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="177.9629" x="807.7642" y="1125.9487">&#8226; array repetition elements</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="807.7642" y="1141.0815">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="234.6602" x="807.7642" y="1156.2144">It is not called from parse_arg_list(),</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="243.5342" x="807.7642" y="1171.3472">enum value assignments, subranges,</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="251.0879" x="807.7642" y="1186.48">string-length expressions, statements,</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="238.7861" x="807.7642" y="1201.6128">or ordinary Pratt expression parsing.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="807.7642" y="1216.7456">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="223.9771" x="807.7642" y="1231.8784">`(` Name `:=` emits InitializerList.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="228.6489" x="807.7642" y="1247.0112">Array defaults emit ArrayInitializer.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="275.0059" x="807.7642" y="1262.144">Malformed aggregate recovery stays local</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="183.6313" x="807.7642" y="1277.2769">to the declaration initializer.</text><path d="M1286.7349,1078.6162 L1286.7349,1194.5459 L1589.939,1194.5459 L1589.939,1088.6162 L1579.939,1078.6162 L1286.7349,1078.6162" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1579.939,1078.6162 L1579.939,1088.6162 L1589.939,1088.6162 L1579.939,1078.6162" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="274.8281" x="1292.7349" y="1095.6831">Grammar modules (parser/grammar/)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="282.2041" x="1292.7349" y="1110.8159">&#8226; pou.rs - PROGRAM, FUNCTION, FB, CLASS</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="237.2627" x="1292.7349" y="1125.9487">&#8226; declarations.rs - VAR blocks, types</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="236.3677" x="1292.7349" y="1141.0815">&#8226; statements.rs - IF, FOR, CASE, etc.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="195.5713" x="1292.7349" y="1156.2144">&#8226; expressions.rs - Pratt parser</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="265.5859" x="1292.7349" y="1171.3472">&#8226; declarations.rs owns initializer-position</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="248.0791" x="1300.9995" y="1186.48">parsing through parse_var_initializer()</text><rect fill="#FFFFFF" height="32.8047" rx="12.5" ry="12.5" style="stroke:#000000;strok