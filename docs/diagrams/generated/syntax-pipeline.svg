gth="323.5381" x="2522.3286" y="2296.7676">&#8226; Punctuation: Semicolon, Colon, Dot, Comma</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="317.7822" x="2522.3286" y="2313.0645">&#8226; Operators: Plus, Minus, Star, Slash, Eq, Neq</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="333.7441" x="2522.3286" y="2329.3613">&#8226; Keywords: KwProgram, KwFunction, KwIf, etc.</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="314.1182" x="2522.3286" y="2345.6582">&#8226; Literals: IntLiteral, RealLiteral, StringLiteral</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="2522.3286" y="2361.9551">&#160;</text><text fill="#000000" font-family="Verdana" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="191.9805" x="2522.3286" y="2378.252">Composite Nodes (~65):</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="171.2334" x="2522.3286" y="2394.5488">&#8226; SourceFile - Root node</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="294.3555" x="2522.3286" y="2410.8457">&#8226; Program, Function, FunctionBlock, Class</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="296.7617" x="2522.3286" y="2427.1426">&#8226; Method, Property, Interface, Namespace</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="215.5986" x="2522.3286" y="2443.4395">&#8226; VarBlock, VarDecl, TypeSpec</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="278.2227" x="2522.3286" y="2459.7363">&#8226; IfStmt, ForStmt, WhileStmt, CaseStmt</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="312.6963" x="2522.3286" y="2476.0332">&#8226; BinaryExpr, UnaryExpr, CallExpr, FieldExpr</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="212.7275" x="2522.3286" y="2492.3301">&#8226; InitializerList, ArrayInitializer</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="2522.3286" y="2508.627">&#160;</text><text fill="#000000" font-family="Verdana" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="220.0693" x="2522.3286" y="2524.9238">Initializer Context Contract:</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="306.5234" x="2522.3286" y="2541.2207">&#8226; TYPE-level defaults and VAR defaults may</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="248.3975" x="2531.229" y="2557.5176">contain aggregate initializer nodes.</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="385.1641" x="2522.3286" y="2573.8145">&#8226; Function-call named arguments remain CallExpr/Arg.</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="367.1172" x="2522.3286" y="2590.1113">&#8226; Enum explicit values remain ordinary expressions.</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="2522.3286" y="2606.4082">&#160;</text><text fill="#000000" font-family="Verdana" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="76.9316" x="2522.3286" y="2622.7051">Key Files:</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="271.4961" x="2522.3286" y="2639.002">&#8226; lexer/tokens.rs:44 - TokenKind enum</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="225.415" x="2522.3286" y="2655.2988">&#8226; lexer/mod.rs:14 - Token struct</text><text fil