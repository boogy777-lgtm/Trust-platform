name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # GitHub runners do not guarantee sccache availability; disable wrapper in CI.
  RUSTC_WRAPPER: ""

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Guard IEC log paths
        run: python3 ./scripts/check_iec_log_paths.py
      - name: Guard expensive gate observability
        run: python3 ./scripts/check_gate_observability.py
      - name: Guard regression-test-first bug fixes
        run: |
          python3 ./scripts/check_regression_test_first.py --self-test
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          python3 ./scripts/check_regression_test_first.py --base "${BASE_SHA}" --head "${HEAD_SHA}"
      - run: cargo fmt --all -- --check
      - name: Mark gate success
        if: ${{ success() }}
        run: |
          mkdir -p gate-artifacts
          echo "job=fmt result=success" > gate-artifacts/fmt.txt
      - name: Upload gate marker
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: gate-fmt
          path: gate-artifacts/fmt.txt

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Ensure scripts are executable
        run: find scripts -name "*.sh" -exec chmod +x {} +
      - name: Guard Windows path hygiene in tests
        run: ./scripts/check_test_path_hygiene.sh
      - name: Install Windows cross-compiler for runtime warning gate
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64
      - name: Guard trust-runtime cross-target warnings
        run: ./scripts/check_runtime_cross_target_warnings.sh --install-missing --require-cross
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Mark gate success
        if: ${{ success() }}
        run: |
          mkdir -p gate-artifacts
          echo "job=clippy result=success" > gate-artifacts/clippy.txt
      - name: Upload gate marker
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: gate-clippy
          path: gate-artifacts/clippy.txt

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Prepare test log path
        shell: bash
        run: |
          mkdir -p gate-artifacts
          : > "gate-artifacts/test-${{ matrix.os }}.log"
      - name: Free disk space on ubuntu runners
        if: ${{ matrix.os == 'ubuntu-latest' }}
        shell: bash
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android || true
          df -h
      - name: Run cargo build --all-targets (retry once on transient failure)
        shell: bash
        run: |
          set -euo pipefail
          PYTHON_BIN=python3
          if ! command -v "${PYTHON_BIN}" >/dev/null 2>&1; then
            PYTHON_BIN=python
          fi
          LOG_PATH="gate-artifacts/test-${{ matrix.os }}.log"
          for attempt in 1 2; do
            echo "=== cargo build attempt ${attempt}/2 (${{ matrix.os }}) ===" | tee -a "${LOG_PATH}"
            if "${PYTHON_BIN}" scripts/run_with_progress.py \
              --phase ci-cargo-build \
              --target "${{ matrix.os }} attempt ${attempt}/2" \
              --timeout-seconds "${CI_CARGO_BUILD_TIMEOUT_SECONDS:-1800}" \
              --progress-interval-seconds "${GATE_PROGRESS_INTERVAL_SECONDS:-30}" \
              --log "${LOG_PATH}" \
              -- cargo build --all-targets; then
              exit 0
            fi
            if [[ "${attempt}" -lt 2 ]]; then
              echo "cargo build failed on attempt ${attempt}; retrying once..." | tee -a "${LOG_PATH}"
            fi
          done
          echo "cargo build --all-targets failed after 2 attempts." | tee -a "${LOG_PATH}"
          exit 1
      - name: trust-runtime warnings denied
        shell: bash
        run: |
          set -euo pipefail
          PYTHON_BIN=python3
          if ! command -v "${PYTHON_BIN}" >/dev/null 2>&1; then
            PYTHON_BIN=python
          fi
          LOG_PATH="gate-artifacts/test-${{ matrix.os }}.log"
          RUSTFLAGS=-Dwarnings "${PYTHON_BIN}" scripts/run_with_progress.py \
            --phase ci-runtime-warnings \
            --target "${{ matrix.os }} trust-runtime" \
            --timeout-seconds "${CI_RUNTIME_WARNINGS_TIMEOUT_SECONDS:-1200}" \
            --progress-interval-seconds "${GATE_PROGRESS_INTERVAL_SECONDS:-30}" \
            --log "${LOG_PATH}" \
            -- cargo check -p trust-runtime --all-targets
      - name: Mesh TLS stability gate
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            echo "Skipping mesh TLS stress gate on windows-latest; covered by linux/macos runs."
            exit 0
          fi
          ./scripts/runtime_mesh_tls_stability_gate.sh --iterations 4
      - name: Run full test suite
        shell: bash
        run: |
          set -euo pipefail
          PYTHON_BIN=python3
          if ! command -v "${PYTHON_BIN}" >/dev/null 2>&1; then
            PYTHON_BIN=python
          fi
          mkdir -p gate-artifacts
          LOG_PATH="gate-artifacts/test-${{ matrix.os }}.log"
          : > "${LOG_PATH}"
          for attempt in 1 2; do
            echo "=== full test suite attempt ${attempt}/2 (${{ matrix.os }}) ===" | tee -a "${LOG_PATH}"
            if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
              command=(cargo test --all-targets -- --test-threads=1)
            else
              command=(cargo test --all-targets)
            fi
            if "${PYTHON_BIN}" scripts/run_with_progress.py \
              --phase ci-full-test \
              --target "${{ matrix.os }} attempt ${attempt}/2" \
              --timeout-seconds "${CI_FULL_TEST_TIMEOUT_SECONDS:-2400}" \
              --progress-interval-seconds "${GATE_PROGRESS_INTERVAL_SECONDS:-30}" \
              --log "${LOG_PATH}" \
              -- "${command[@]}"; then
              exit 0
            fi
            if [[ "${attempt}" -lt 2 ]]; then
              echo "Attempt ${attempt} failed; retrying once..." | tee -a "${LOG_PATH}"
            fi
          done
          echo "Full test suite failed after 2 attempts." | tee -a "${LOG_PATH}"
          exit 1
      - name: Upload test suite log
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-log-${{ matrix.os }}
          path: gate-artifacts/test-${{ matrix.os }}.log
      - name: Mark gate success
        if: ${{ success() }}
        shell: bash
        run: |
          mkdir -p gate-artifacts
          echo "job=test os=${{ matrix.os }} result=success" > gate-artifacts/test-${{ matrix.os }}.txt
      - name: Upload gate marker
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: gate-test-${{ matrix.os }}
          path: gate-artifacts/test-${{ matrix.os }}.txt

  conformance:
    name: Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run conformance suite (pass 1)
        run: |
          mkdir -p gate-artifacts
          python3 scripts/run_with_progress.py \
            --phase ci-conformance-pass-1 \
            --target conformance-pass-1 \
            --timeout-seconds "${CI_CONFORMANCE_TIMEOUT_SECONDS:-1800}" \
            --progress-interval-seconds "${GATE_PROGRESS_INTERVAL_SECONDS:-30}" \
            --log gate-artifacts/conformance-pass-1.log \
            -- cargo run -p trust-runtime --bin trust-runtime -- \
            conformance \
            --suite-root conformance \
            --output gate-artifacts/conformance-pass-1.json
      - name: Run conformance suite (pass 2)
        run: |
          python3 scripts/run_with_progress.py \
            --phase ci-conformance-pass-2 \
            --target conformance-pass-2 \
            --timeout-seconds "${CI_CONFORMANCE_TIMEOUT_SECONDS:-1800}" \
            --progress-interval-seconds "${GATE_PROGRESS_INTERVAL_SECONDS:-30}" \
            --log gate-artifacts/conformance-pass-2.log \
            -- cargo run -p trust-runtime --bin trust-runtime -- \
            conformance \
            --suite-root conformance \
            --output gate-artifacts/conformance-pass-2.json
      - name: Verify deterministic ordering and statuses
        run: |
          jq 'del(.generated_at_utc) | .results |= map(del(.duration_ms))' \
            gate-artifacts/conformance-pass-1.json > gate-artifacts/conformance-pass-1.normalized.json
          jq 'del(.generated_at_utc) | .results |= map(del(.duration_ms))' \
            gate-artifacts/conformance-pass-2.json > gate-artifacts/conformance-pass-2.normalized.json
          diff -u \
            gate-artifacts/conformance-pass-1.normalized.json \
            gate-artifacts/conformance-pass-2.normalized.json
      - name: Enforce runtime comms fuzz smoke budget gate
        run: |
          OUT_DIR=gate-artifacts/runtime-comms-fuzz \
          TRUST_COMMS_FUZZ_ITERS=512 \
          ./scripts/runtime_comms_fuzz_gate.sh
      - name: Enforce runtime comms benchmark threshold gate
        run: |
          OUT_DIR=gate-artifacts/runtime-comms-bench \
          TRUST_COMMS_BENCH_SAMPLES=256 \
          ./scripts/runtime_comms_bench_gate.sh
      - name: Capture runtime VM syntax corpus benchmark evidence (quick profile)
        run: |
          OUT_DIR=gate-artifacts/runtime-vm-bench \
          TRUST_VM_BENCH_PROFILE=quick \
          TRUST_VM_BENCH_HOST_CODEGEN=generic \
          ./scripts/runtime_vm_bench_gate.sh
      - name: Capture runtime VM determinism/reliability evidence
        run: |
          OUT_DIR=gate-artifacts/runtime-vm-determinism \
          TRUST_VM_DETERMINISM_ITERATIONS=2 \
          TRUST_VM_DETERMINISM_TEST_THREADS=1 \
          ./scripts/runtime_vm_determinism_reliability_gate.sh
      - name: Enforce MP-060 production backend leak guard
        run: |
          ./scripts/runtime_vm_production_backend_guard.sh
      - name: Enforce runtime cloud security profile evidence gate
        run: |
          OUT_DIR=gate-artifacts/runtime-cloud-security-profiles \
          ./scripts/runtime_cloud_security_profile_gate.sh
      - name: Enforce Zenoh baseline version gate
        run: |
          ./scripts/check_zenoh_baseline.sh
      - name: Enforce runtime comms conformance matrix gate
        run: |
          OUT_DIR=gate-artifacts/runtime-comms-conformance \
          ./scripts/runtime_comms_conformance_gate.sh
      - name: Upload conformance artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: conformance-suite
          path: |
            gate-artifacts/conformance-pass-*.json
            gate-artifacts/runtime-comms-fuzz/**
            gate-artifacts/runtime-comms-bench/**
            gate-artifacts/runtime-vm-bench/**
            gate-artifacts/runtime-vm-determinism/**
            gate-artifacts/runtime-cloud-security-profiles/**
            gate-artifacts/runtime-comms-conformance/**
      - name: Mark gate success
        if: ${{ success() }}
        run: |
          mkdir -p gate-artifacts
          echo "job=conformance result=success" > gate-artifacts/conformance.txt
      - name: Upload gate marker
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: gate-conformance
          path: gate-artifacts/conformance.txt

  architecture-safety:
    name: Architecture Safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install architecture scanner dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
      - name: Install ast-grep
        run: |
          if command -v ast-grep >/dev/null 2>&1; then
            ast-grep --version
          else
            cargo install ast-grep --version 0.42.1 --locked
            ast-grep --version
          fi
      - name: Install cargo-public-api
        run: |
          if cargo public-api --version >/dev/null 2>&1; then
            cargo public-api --version
          else
            cargo install cargo-public-api --version 0.51.0 --locked
            cargo public-api --version
          fi
      - name: Run external unsafe AST scanner gate
        run: ./scripts/architecture_external_safety_ast_grep_gate.sh
      - name: Run runtime boundary fail-closed gate
        run: ./scripts/runtime_boundary_fail_closed_ast_grep_gate.sh
      - name: Run runtime safety fail-closed gate
        run: ./scripts/runtime_safety_fail_closed_ast_grep_gate.sh
      - name: Run full-map architecture doctor
        run: cargo run -p xtask -- architecture-doctor --full-map
      - name: Upload architecture safety artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: architecture-safety
          path: |
            target/gate-artifacts/architecture-external-safety-*/**
            target/gate-artifacts/runtime-boundary-fail-closed-*/**
            target/gate-artifacts/runtime-safety-fail-closed-*/**
            target/gate-artifacts/full-software-map-*/software-map.json
            target/gate-artifacts/full-software-map-*/full-map-report.json
            target/gate-artifacts/full-software-map-*/full-map-report.md
      - name: Mark gate success
        if: ${{ success() }}
        run: |
          mkdir -p gate-artifacts
          echo "job=architecture-safety result=success" > gate-artifacts/architecture-safety.txt
      - name: Upload gate marker
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: gate-architecture-safety
          path: gate-artifacts/architecture-safety.txt

  msrv:
    name: MSRV (1.95)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets
        env:
          CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS: fallback
      - name: Mark gate success
        if: ${{ success() }}
        run: |
          mkdir -p gate-artifacts
          echo "job=msrv result=success" > gate-artifacts/msrv.txt
      - name: Upload gate marker
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: gate-msrv
          path: gate-artifacts/msrv.txt

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Mark gate success
        if: ${{ success() }}
        run: |
          mkdir -p gate-artifacts
          echo "job=docs result=success" > gate-artifacts/docs.txt
      - name: Upload gate marker
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: gate-docs
          path: gate-artifacts/docs.txt

  browser-analysis:
    name: Browser Analysis Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Run parity + latency + memory + incremental gates
        run: ./scripts/check_mp010_browser_analysis.sh
      - name: Run browser host smoke gate
        run: ./scripts/check_browser_analysis_host_smoke.sh
      - name: Run worker recovery gate
        run: ./scripts/check_browser_analysis_worker_recovery.sh
      - name: Mark gate success
        if: ${{ success() }}
        run: |
          mkdir -p gate-artifacts
          echo "job=browser-analysis result=success" > gate-artifacts/browser-analysis.txt
      - name: Upload gate marker
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: gate-browser-analysis
          path: gate-artifacts/browser-analysis.txt

  vscode-extension:
    name: VS Code Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: editors/vscode/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run lint
      - run: npm run compile
      - name: Build VS Code integration test binaries
        run: |
          set -euo pipefail
          mkdir -p gate-artifacts
          python3 scripts/run_with_progress.py \
            --phase ci-vscode-binaries \
            --target trust-lsp-trust-debug-trust-runtime-trust-dev \
            --timeout-seconds "${CI_VSCODE_BINARIES_TIMEOUT_SECONDS:-1200}" \
            --progress-interval-seconds "${GATE_PROGRESS_INTERVAL_SECONDS:-30}" \
            --log gate-artifacts/vscode-binaries.log \
            -- cargo build -p trust-lsp -p trust-debug -p trust-runtime -p trust-dev
        working-directory: ${{ github.workspace }}
      - name: Add trust-lsp binary directory to PATH
        run: echo "${{ github.workspace }}/target/debug" >> "$GITHUB_PATH"
      - name: Install virtual display dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
      - name: Run extension integration tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/gate-artifacts"
          LOG_PATH="${GITHUB_WORKSPACE}/gate-artifacts/vscode-extension-test.log"
          : > "${LOG_PATH}"
          for attempt in 1 2; do
            echo "=== VS Code integration attempt ${attempt}/2 ===" | tee -a "${LOG_PATH}"
            if python3 ../../scripts/run_with_progress.py \
              --phase ci-vscode-extension \
              --target "npm-test attempt ${attempt}/2" \
              --timeout-seconds "${CI_VSCODE_TEST_TIMEOUT_SECONDS:-1800}" \
              --progress-interval-seconds "${GATE_PROGRESS_INTERVAL_SECONDS:-30}" \
              --log "${LOG_PATH}" \
              -- xvfb-run -a npm test; then
              exit 0
            fi
            if [[ "${attempt}" -lt 2 ]]; then
              echo "Attempt ${attempt} failed; retrying once..." | tee -a "${LOG_PATH}"
            fi
          done
          echo "VS Code integration tests failed after 2 attempts." | tee -a "${LOG_PATH}"
          exit 1
        env:
          ST_LSP_TEST_SERVER: ${{ github.workspace }}/target/debug/trust-lsp
          ST_RUNTIME_TEST_BIN: ${{ github.workspace }}/target/debug/trust-dev
      - name: Upload VS Code integration test log
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: vscode-extension-test-log
          path: gate-artifacts/vscode-extension-test.log
      - name: Mark gate success
        if: ${{ success() }}
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/gate-artifacts"
          echo "job=vscode-extension result=success" > "${GITHUB_WORKSPACE}/gate-artifacts/vscode-extension.txt"
      - name: Upload gate marker
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: gate-vscode-extension
          path: gate-artifacts/vscode-extension.txt

  editor-expansion:
    name: Editor Expansion Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Validate Neovim/Zed editor setup and core workflow coverage
        run: ./scripts/check_editor_integration_smoke.sh
      - name: Mark gate success
        if: ${{ success() }}
        run: |
          mkdir -p gate-artifacts
          echo "job=editor-expansion result=success" > gate-artifacts/editor-expansion.txt
      - name: Upload gate marker
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: gate-editor-expansion
          path: gate-artifacts/editor-expansion.txt

  mp001-parity:
    name: MP-001 Parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify split-test parity and discovery stability
        run: scripts/check_mp001_split_parity.sh --verify
      - name: Mark gate success
        if: ${{ success() }}
        run: |
          mkdir -p gate-artifacts
          echo "job=mp001-parity result=success" > gate-artifacts/mp001-parity.txt
      - name: Upload gate marker
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: gate-mp001-parity
          path: gate-artifacts/mp001-parity.txt

  version-release-guard:
    name: Version Release Guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate workspace/extension version alignment
        run: |
          python3 scripts/check_release_version_alignment.py
      - name: Validate version bump release evidence
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/check_version_release_evidence.py \
            --event-name "${{ github.event_name }}" \
            --ref "${{ github.ref }}" \
            --before "${{ github.event.before }}" \
            --after "${{ github.sha }}" \
            --repo "${{ github.repository }}"
      - name: Mark gate success
        if: ${{ success() }}
        run: |
          mkdir -p gate-artifacts
          echo "job=version-release-guard result=success" > gate-artifacts/version-release-guard.txt
      - name: Upload gate marker
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: gate-version-release-guard
          path: gate-artifacts/version-release-guard.txt

  release-gate-report:
    name: Release Gate Report
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, msrv, docs, browser-analysis, vscode-extension, editor-expansion, mp001-parity, version-release-guard]
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare gate artifact directory
        run: mkdir -p gate-artifacts

      - name: Download gate markers
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          path: gate-artifacts
          pattern: gate-*

      - name: Generate release gate report
        env:
          NEED_FMT: ${{ needs.fmt.result }}
          NEED_CLIPPY: ${{ needs.clippy.result }}
          NEED_TEST: ${{ needs.test.result }}
          NEED_MSRV: ${{ needs.msrv.result }}
          NEED_DOCS: ${{ needs.docs.result }}
          NEED_BROWSER_ANALYSIS: ${{ needs['browser-analysis'].result }}
          NEED_VSCODE_EXTENSION: ${{ needs['vscode-extension'].result }}
          NEED_EDITOR_EXPANSION: ${{ needs['editor-expansion'].result }}
          NEED_MP001_PARITY: ${{ needs['mp001-parity'].result }}
          NEED_VERSION_RELEASE_GUARD: ${{ needs['version-release-guard'].result }}
        run: |
          python3 scripts/generate_release_gate_report.py \
            --output-dir gate-report \
            --gate-artifacts-dir gate-artifacts \
            --required-gate gate-fmt \
            --required-gate gate-clippy \
            --required-gate gate-test-ubuntu-latest \
            --required-gate gate-test-macos-latest \
            --required-gate gate-test-windows-latest \
            --required-gate gate-msrv \
            --required-gate gate-docs \
            --required-gate gate-browser-analysis \
            --required-gate gate-vscode-extension \
            --required-gate gate-editor-expansion \
            --required-gate gate-mp001-parity \
            --required-gate gate-version-release-guard \
            --job-status "fmt=${NEED_FMT}" \
            --job-status "clippy=${NEED_CLIPPY}" \
            --job-status "test=${NEED_TEST}" \
            --job-status "msrv=${NEED_MSRV}" \
            --job-status "docs=${NEED_DOCS}" \
            --job-status "browser-analysis=${NEED_BROWSER_ANALYSIS}" \
            --job-status "vscode-extension=${NEED_VSCODE_EXTENSION}" \
            --job-status "editor-expansion=${NEED_EDITOR_EXPANSION}" \
            --job-status "mp001-parity=${NEED_MP001_PARITY}" \
            --job-status "version-release-guard=${NEED_VERSION_RELEASE_GUARD}" \
            --checklist docs/release-gate-checklist.md

      - name: Upload release gate report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: release-gate-report
          path: gate-report/
