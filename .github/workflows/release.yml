name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # GitHub runners do not guarantee sccache availability; disable wrapper in CI/release.
  RUSTC_WRAPPER: ""

jobs:
  runtime-vm-validation:
    name: Runtime VM Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run MP-060 full VM benchmark gate
        run: |
          OUT_DIR=artifacts/release/runtime-vm-bench \
          TRUST_VM_BENCH_PROFILE=full \
          TRUST_VM_BENCH_TIER=default \
          TRUST_VM_BENCH_HOST_CODEGEN=generic \
          ./scripts/runtime_vm_bench_gate.sh

      - name: Run MP-060 VM determinism and reliability gate
        run: |
          OUT_DIR=artifacts/release/runtime-vm-determinism \
          TRUST_VM_DETERMINISM_ITERATIONS=3 \
          TRUST_VM_DETERMINISM_TEST_THREADS=1 \
          ./scripts/runtime_vm_determinism_reliability_gate.sh

      - name: Upload runtime VM validation artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: release-runtime-vm-validation
          path: |
            artifacts/release/runtime-vm-bench/**
            artifacts/release/runtime-vm-determinism/**

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binaries
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            CROSS_CONTAINER_OPTS="--env RUSTC_WRAPPER=" \
              cross build --release --target ${{ matrix.target }} -p trust-lsp -p trust-debug -p trust-runtime -p trust-dev
          else
            cargo build --release --target ${{ matrix.target }} -p trust-lsp -p trust-debug -p trust-runtime -p trust-dev
          fi
        shell: bash

      - name: Prepare extension binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p editors/vscode/bin
          cp target/${{ matrix.target }}/release/trust-lsp editors/vscode/bin/
          cp target/${{ matrix.target }}/release/trust-debug editors/vscode/bin/
          chmod +x editors/vscode/bin/*

      - name: Prepare extension binaries (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p editors/vscode/bin
          cp target/${{ matrix.target }}/release/trust-lsp.exe editors/vscode/bin/
          cp target/${{ matrix.target }}/release/trust-debug.exe editors/vscode/bin/
        shell: bash

      - name: Package runtime (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/runtime-${{ matrix.platform }}
          cp target/${{ matrix.target }}/release/trust-runtime dist/runtime-${{ matrix.platform }}/
          cp target/${{ matrix.target }}/release/trust-dev dist/runtime-${{ matrix.platform }}/
          cp target/${{ matrix.target }}/release/trust-bundle-gen dist/runtime-${{ matrix.platform }}/
          cp docs/deploy/INSTALL.md dist/runtime-${{ matrix.platform }}/
          cp docs/deploy/systemd/trust-runtime.service dist/runtime-${{ matrix.platform }}/
          cat > dist/runtime-${{ matrix.platform }}/README.txt <<'README'
          truST Runtime

          This bundle contains the trust-runtime, trust-dev, and trust-bundle-gen binaries.

          Quick start:
          - Put trust-runtime, trust-dev, and trust-bundle-gen on your PATH
          - Run: trust-runtime --project <your-project>

          See INSTALL.md for full setup details.
          README
          tar -czf trust-runtime-${{ matrix.platform }}.tar.gz -C dist/runtime-${{ matrix.platform }} .

      - name: Package trust-lsp (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/trust-lsp-${{ matrix.platform }}
          cp target/${{ matrix.target }}/release/trust-lsp dist/trust-lsp-${{ matrix.platform }}/
          cat > dist/trust-lsp-${{ matrix.platform }}/README.txt <<'README'
          truST IEC 61131-3 Structured Text Language Server

          Put trust-lsp on your PATH and configure your editor for .st files.
          Claude Code users: install the trust-st-lsp plugin from
          https://github.com/johannesPettersson80/trust-claude-plugins
          README
          tar -czf trust-lsp-${{ matrix.platform }}.tar.gz -C dist/trust-lsp-${{ matrix.platform }} .

      - name: Package runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\runtime-${{ matrix.platform }} | Out-Null
          Copy-Item target/${{ matrix.target }}/release/trust-runtime.exe dist/runtime-${{ matrix.platform }}/
          Copy-Item target/${{ matrix.target }}/release/trust-dev.exe dist/runtime-${{ matrix.platform }}/
          Copy-Item target/${{ matrix.target }}/release/trust-bundle-gen.exe dist/runtime-${{ matrix.platform }}/
          Copy-Item docs/deploy/INSTALL.md dist/runtime-${{ matrix.platform }}/
          Copy-Item docs/deploy/systemd/trust-runtime.service dist/runtime-${{ matrix.platform }}/
          @'
          truST Runtime

          This bundle contains the trust-runtime, trust-dev, and trust-bundle-gen binaries.

          Quick start:
          - Put trust-runtime.exe, trust-dev.exe, and trust-bundle-gen.exe on your PATH
          - Run: trust-runtime --project <your-project>

          See INSTALL.md for full setup details.
          '@ | Set-Content -Path dist/runtime-${{ matrix.platform }}/README.txt
          Compress-Archive -Path dist/runtime-${{ matrix.platform }}/* -DestinationPath trust-runtime-${{ matrix.platform }}.zip

      - name: Package trust-lsp (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\trust-lsp-${{ matrix.platform }} | Out-Null
          Copy-Item target/${{ matrix.target }}/release/trust-lsp.exe dist/trust-lsp-${{ matrix.platform }}/
          @'
          truST IEC 61131-3 Structured Text Language Server

          Put trust-lsp.exe on your PATH and configure your editor for .st files.
          Claude Code users: install the trust-st-lsp plugin from
          https://github.com/johannesPettersson80/trust-claude-plugins
          '@ | Set-Content -Path dist/trust-lsp-${{ matrix.platform }}/README.txt
          Compress-Archive -Path dist/trust-lsp-${{ matrix.platform }}/* -DestinationPath trust-lsp-${{ matrix.platform }}.zip

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Compile extension
        working-directory: editors/vscode
        run: npm run compile

      - name: Package extension
        working-directory: editors/vscode
        run: npx vsce package --target ${{ matrix.platform }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.platform }}
          path: editors/vscode/*.vsix

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v7
        with:
          name: runtime-${{ matrix.platform }}
          path: |
            trust-runtime-${{ matrix.platform }}.tar.gz
            trust-runtime-${{ matrix.platform }}.zip

      - name: Upload trust-lsp artifact
        uses: actions/upload-artifact@v7
        with:
          name: trust-lsp-${{ matrix.platform }}
          path: |
            trust-lsp-${{ matrix.platform }}.tar.gz
            trust-lsp-${{ matrix.platform }}.zip

  publish:
    name: Publish
    needs: [build, runtime-vm-validation]
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v6

      - name: Download VSIX artifacts
        uses: actions/download-artifact@v8
        with:
          path: vsix-artifacts
          pattern: vsix-*
          merge-multiple: true

      - name: Download runtime artifacts
        uses: actions/download-artifact@v8
        with:
          path: runtime-artifacts
          pattern: runtime-*
          merge-multiple: true

      - name: Download trust-lsp artifacts
        uses: actions/download-artifact@v8
        with:
          path: trust-lsp-artifacts
          pattern: trust-lsp-*
          merge-multiple: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          vsix_files=(vsix-artifacts/*.vsix)
          if [ "${#vsix_files[@]}" -eq 0 ]; then
            echo "No VSIX artifacts found in vsix-artifacts/"
            exit 1
          fi

          max_attempts=4
          for vsix in "${vsix_files[@]}"; do
            attempt=1
            while [ "$attempt" -le "$max_attempts" ]; do
              echo "Publishing $vsix (attempt $attempt/$max_attempts)"
              output_file="$(mktemp)"
              if vsce publish --packagePath "$vsix" >"$output_file" 2>&1; then
                cat "$output_file"
                rm -f "$output_file"
                break
              fi

              exit_code=$?
              output="$(cat "$output_file")"
              cat "$output_file"
              rm -f "$output_file"

              if echo "$output" | grep -Eiq "already exists|already been published|already published"; then
                echo "VSIX already published for $vsix; treating as success."
                break
              fi

              if echo "$output" | grep -Eiq "Request timeout|ETIMEDOUT|ECONNRESET|socket hang up|ENOTFOUND|EAI_AGAIN|502|503|504"; then
                if [ "$attempt" -lt "$max_attempts" ]; then
                  sleep_seconds=$((attempt * 10))
                  echo "Transient publish failure for $vsix; retrying in ${sleep_seconds}s..."
                  sleep "$sleep_seconds"
                  attempt=$((attempt + 1))
                  continue
                fi
              fi

              echo "Failed to publish $vsix after $attempt attempt(s)."
              exit "$exit_code"
            done
          done

      - name: Skip Marketplace publish (missing VSCE_PAT)
        if: ${{ env.VSCE_PAT == '' }}
        run: echo "VSCE_PAT not set; skipping Marketplace publish"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            vsix-artifacts/*.vsix
            runtime-artifacts/*.tar.gz
            runtime-artifacts/*.zip
            trust-lsp-artifacts/*.tar.gz
            trust-lsp-artifacts/*.zip
          generate_release_notes: true
