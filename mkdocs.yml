site_name: truST Documentation
site_description: Free, open-source IEC 61131-3 Structured Text IDE and runtime. VS Code extension, browser HMI, JSON-RPC API. Runs on Linux, including PREEMPT_RT soft-real-time deployments, macOS, Windows, and Raspberry Pi.
site_url: https://johannespettersson80.github.io/trust-platform/
repo_url: https://github.com/boogy777-lgtm/Trust-platform
repo_name: trust-platform
edit_uri: edit/main/docs/public/
docs_dir: docs/public
site_dir: site/public
not_in_nav: |
  contribute.md
  MAINTAINING.md
copyright: "© 2026 Johannes Pettersson — MIT/Apache-2.0 — johannes_salomon@hotmail.com"
theme:
  name: material
  custom_dir: docs/public/overrides
  logo: assets/images/brand/trust-logo-mark.svg
  favicon: assets/images/brand/trust-favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
markdown_extensions:
  - admonition
  - attr_list
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
  - toc:
      permalink: true
plugins:
  - search:
      separator: '[\s\-\.]+'
  - mermaid2:
      version: "9.4.3"
      javascript: assets/vendor/mermaid.min.js
extra:
  social_image: assets/images/brand/trust-og.png
extra_css:
  - assets/stylesheets/extra.css
