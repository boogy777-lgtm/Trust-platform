[bundle]
version = 1

[resource]
name = "DistrictPumpNetworkProxyMediatorOop"
cycle_interval_ms = 100

[runtime.control]
endpoint = "tcp://127.0.0.1:0"
auth_token = "trust-oscat-oop-example-token"

[runtime.opcua]
enabled = true
listen = "127.0.0.1:4840"
endpoint_path = "/"
namespace_uri = "urn:trust:examples:district-pump-network-proxy-mediator"
publish_interval_ms = 500
max_nodes = 128
expose = ["Network.TotalDemandM3H", "Network.PumpSpeedPct", "Network.RemoteStaleCount", "Network.ClassAAlarm"]
security_policy = "none"
security_mode = "none"
allow_anonymous = true
