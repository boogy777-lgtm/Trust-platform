[io]
drivers = [
  { name = "modbus-tcp", params = { address = "127.0.0.1:1513", unit_id = 180, input_start = 0, output_start = 0, timeout_ms = 500, on_error = "warn" } },
  { name = "mqtt", params = { broker = "127.0.0.1:1883", topic_in = "kiln/dryer/01/cmd", topic_out = "kiln/dryer/01/snapshot", reconnect_ms = 500, keep_alive_s = 5, allow_insecure_remote = false } }
]
