[io]
drivers = [
  { name = "modbus-rtu", params = { device = "loop://pasteurizer-flowmeter", baud = 19200, parity = "even", slave = 31, timeout_ms = 250, on_error = "warn" } },
  { name = "mqtt", params = { broker = "127.0.0.1:1883", topic_in = "dairy/pasteurizer/01/cmd", topic_out = "dairy/pasteurizer/01/batch_quality", reconnect_ms = 500, keep_alive_s = 5, allow_insecure_remote = false } }
]

[[io.safe_state]]
address = "%QX0.0"
value = "FALSE"
