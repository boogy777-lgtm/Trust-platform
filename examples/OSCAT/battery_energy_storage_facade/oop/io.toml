[io]
drivers = [
  { name = "modbus-tcp", params = { address = "127.0.0.1:1509", unit_id = 140, input_start = 0, output_start = 0, timeout_ms = 500, on_error = "warn" } },
  { name = "mqtt", params = { broker = "127.0.0.1:1883", topic_in = "energy/bess/01/cmd", topic_out = "energy/bess/01/alarm", reconnect_ms = 500, keep_alive_s = 5, allow_insecure_remote = false } }
]
