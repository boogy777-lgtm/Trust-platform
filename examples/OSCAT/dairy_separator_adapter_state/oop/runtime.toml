[bundle]
version = 1

[resource]
name = "DairySeparatorAdapterStateOop"
cycle_interval_ms = 50

[runtime.control]
endpoint = "tcp://127.0.0.1:0"
auth_token = "trust-oscat-oop-example-token"

[runtime.opcua]
enabled = true
listen = "127.0.0.1:4840"
endpoint_path = "/"
namespace_uri = "urn:trust:examples:dairy-separator-adapter-state"
publish_interval_ms = 250
max_nodes = 128
expose = ["Separator.StateId", "Separator.BowlRunning", "Separator.FeedValveOpen", "Separator.NormalizedFaultCode"]
security_policy = "none"
security_mode = "none"
allow_anonymous = true
