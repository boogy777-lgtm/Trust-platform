[bundle]
version = 1

[resource]
name = "RoboticPalletizerCommandStateOop"
cycle_interval_ms = 20

[runtime.control]
endpoint = "tcp://127.0.0.1:0"
auth_token = "trust-oscat-oop-example-token"

[runtime.opcua]
enabled = true
listen = "127.0.0.1:4840"
endpoint_path = "/"
namespace_uri = "urn:trust:examples:robotic-palletizer-command-state"
publish_interval_ms = 250
max_nodes = 128
expose = ["Cell.CurrentStateId", "Cell.CompletedPallets", "Cell.LastCommandId", "Cell.Faulted"]
security_policy = "none"
security_mode = "none"
allow_anonymous = true

[runtime.log]
level = "info"

[runtime.retain]
mode = "none"
save_interval_ms = 1000

[runtime.watchdog]
enabled = false
timeout_ms = 1000
action = "halt"

[runtime.fault]
policy = "halt"
